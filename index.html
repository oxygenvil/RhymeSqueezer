<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="발음 기준으로 라임(운율)이 맞는 한국어 단어를 찾아주는 검색기">
<title>라임 검색기 — 소리로 찾는 한국어 라임</title>
<meta name="theme-color" content="#65a30d">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><rect x='4' y='4' width='112' height='112' rx='28' fill='%2322c55e'/><circle cx='60' cy='60' r='36' fill='%23d9f99d'/><g stroke='%2315290a' stroke-width='7' stroke-linecap='round'><line x1='60' y1='32' x2='60' y2='88'/><line x1='36' y1='46' x2='84' y2='74'/><line x1='36' y1='74' x2='84' y2='46'/></g><circle cx='60' cy='60' r='8' fill='%2315290a'/></svg>">
<style>
/* ===== 디자인 토큰 ===== */
:root{
  --bg:#f4f7ee; --bg2:#ebf0e0; --card:#ffffff; --line:#e2e8d6; --line2:#cfdabd;
  --ink:#1a2213; --dim:#78846a; --faint:#a7b294;
  --pri:#65a30d; --pri-strong:#4d7c0f; --pri-ink:#4d7c0f;
  --pri-soft:#eef7db; --pri-line:#c9e29b;
  --hit:#4d7c0f; --hit-ink:#ffffff;
  --grad:linear-gradient(135deg,#a3e635,#22c55e);
  --grad-ink:#15290a; --glow:rgba(101,163,13,.35);
  --ok:#0d9488; --shadow:0 1px 2px rgba(26,34,19,.04),0 4px 16px rgba(26,34,19,.05);
  --shadow-lg:0 4px 12px rgba(26,34,19,.06),0 12px 40px rgba(26,34,19,.10);
  --r-lg:18px; --r-md:12px; --r-sm:9px;
}
:root[data-theme="dark"]{
  --bg:#0d110a; --bg2:#12170e; --card:#161c11; --line:#242d19; --line2:#324024;
  --ink:#e9f0dd; --dim:#94a183; --faint:#5c6a4c;
  --pri:#84cc16; --pri-strong:#a3e635; --pri-ink:#a3e635;
  --pri-soft:#1d2911; --pri-line:#3e5321;
  --hit:#a3e635; --hit-ink:#16210b;
  --grad:linear-gradient(135deg,#a3e635,#4ade80);
  --grad-ink:#132408; --glow:rgba(163,230,53,.22);
  --ok:#2dd4bf; --shadow:0 1px 2px rgba(0,0,0,.25),0 4px 16px rgba(0,0,0,.25);
  --shadow-lg:0 4px 12px rgba(0,0,0,.3),0 12px 40px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);color:var(--ink);
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,
    'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','Segoe UI',sans-serif;
  min-height:100vh;line-height:1.5;
  transition:background .25s,color .25s;
}
button{font-family:inherit;color:inherit}
::selection{background:#bef264;color:#1a2e05}

.wrap{max-width:920px;margin:0 auto;padding:28px 18px 110px}

/* ===== 헤더 ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;gap:12px}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.logo{width:40px;height:40px;flex:none;border-radius:12px;display:grid;place-items:center;
  background:var(--grad);color:var(--grad-ink);
  font-weight:800;font-size:17px;letter-spacing:-.02em;box-shadow:0 4px 14px var(--glow)}
.brand h1{font-size:19px;font-weight:800;letter-spacing:-.01em;line-height:1.2}
.brand .tg{font-size:12px;color:var(--dim);margin-top:1px}
.brand .tg b{color:var(--pri-ink);font-weight:700}
.tools{display:flex;gap:8px;flex:none}
.icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--card);
  cursor:pointer;display:grid;place-items:center;font-size:16px;color:var(--dim);
  transition:border-color .15s,color .15s}
.icon-btn:hover{border-color:var(--pri);color:var(--pri-ink)}
.meta{font-size:11px;color:var(--faint);text-align:right}

/* ===== 검색 패널 ===== */
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:22px;box-shadow:var(--shadow)}
.cols{display:flex;gap:24px;flex-wrap:wrap}
.col-in{flex:1 1 250px;min-width:230px}
.col-ph{flex:1.5 1 320px;min-width:270px}
.lab{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--dim);margin-bottom:9px;
  display:flex;justify-content:space-between;align-items:center;text-transform:uppercase}
.lab .cnt{background:var(--pri-soft);color:var(--pri-ink);border-radius:999px;padding:2px 10px;
  font-size:11px;letter-spacing:0;font-weight:700;transition:transform .15s}
.lab .cnt.bump{transform:scale(1.12)}

.inbox{position:relative}
#q{width:100%;border:1.5px solid var(--line);border-radius:var(--r-md);background:var(--bg);
  font-size:20px;font-weight:600;padding:13px 42px 13px 15px;outline:0;font-family:inherit;
  color:var(--ink);transition:border-color .15s,background .15s,box-shadow .15s}
#q::placeholder{color:var(--faint);font-weight:400}
#q:focus{border-color:var(--pri);background:var(--card);box-shadow:0 0 0 3px var(--pri-soft)}
#q::-webkit-search-cancel-button{display:none}
#clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:none;
  color:var(--faint);font-size:15px;cursor:pointer;padding:6px 8px;display:none;border-radius:8px}
#clear:hover{color:var(--ink)}

.pron{margin-top:12px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r-md);
  padding:10px 14px;font-size:11px;color:var(--dim);letter-spacing:.06em;font-weight:600}
.pron b{display:block;font-size:19px;color:var(--ink);margin-top:3px;font-weight:700;letter-spacing:0}
.pron b .from{font-size:12px;color:var(--faint);font-weight:500;margin-left:6px}

/* 프리셋 */
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.presets button{border:1px solid var(--line);background:var(--card);border-radius:999px;
  font-size:11.5px;padding:5px 11px;cursor:pointer;color:var(--dim);font-weight:600;
  transition:all .13s}
.presets button:hover{border-color:var(--pri);color:var(--pri-ink);background:var(--pri-soft)}
.presets button:disabled{opacity:.4;cursor:default;pointer-events:none}

/* 음절 셀렉터 */
#syls{display:flex;gap:9px;flex-wrap:wrap;min-height:104px;align-items:flex-start}
.syl{border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;background:var(--card);
  min-width:58px;box-shadow:0 1px 2px rgba(23,27,38,.03)}
.syl .head{font-size:17px;font-weight:800;text-align:center;padding:6px 4px;background:var(--bg);
  border-bottom:1px solid var(--line);cursor:pointer;user-select:none;transition:background .13s,color .13s}
.syl .head:hover{color:var(--pri-ink)}
.syl button{display:flex;justify-content:space-between;gap:10px;width:100%;border:0;background:none;
  font-size:12px;padding:6px 9px;cursor:pointer;color:var(--dim);transition:background .12s}
.syl button+button{border-top:1px dashed var(--line)}
.syl button .g{font-size:9px;letter-spacing:.06em;align-self:center;color:var(--faint)}
.syl button .p{font-size:14px;color:var(--ink);font-weight:700}
.syl button:hover{background:var(--pri-soft)}
.syl button.on{background:var(--hit)}
.syl button.on:hover{background:var(--hit);filter:brightness(1.08)}
.syl button.on .g{color:var(--hit-ink);opacity:.65}
.syl button.on .p{color:var(--hit-ink)}
.hint{color:var(--faint);font-size:12.5px;padding:24px 6px;line-height:1.9}
.hint .kbd{display:inline-block;border:1px solid var(--line2);border-bottom-width:2px;border-radius:5px;
  padding:0 6px;font-size:11px;color:var(--dim);background:var(--bg)}

/* ===== 모드 & 검색 ===== */
.modes{display:flex;justify-content:center;gap:0;margin:20px auto 6px;flex-wrap:nowrap;
  background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:4px;width:fit-content;max-width:100%}
.modes button{border:0;background:none;border-radius:999px;color:var(--dim);
  font-size:13px;padding:8px 18px;cursor:pointer;font-weight:600;white-space:nowrap;
  transition:all .15s}
.modes button.on{background:var(--card);color:var(--pri-ink);font-weight:700;
  box-shadow:0 1px 4px rgba(23,27,38,.10)}
.mode-desc{text-align:center;font-size:11.5px;color:var(--faint);margin-bottom:14px;min-height:17px}

/* 모드 툴팁 */
#mtip{position:fixed;z-index:20;max-width:340px;background:var(--card);border:1px solid var(--line2);
  border-radius:12px;padding:12px 14px;box-shadow:var(--shadow-lg);font-size:12px;color:var(--dim);
  opacity:0;pointer-events:none;transform:translateY(4px);transition:opacity .15s,transform .15s}
#mtip.show{opacity:1;transform:none}
#mtip .t-sum{font-size:12.5px;color:var(--ink);line-height:1.55;font-weight:600}
#mtip .t-sum b{color:var(--pri-ink)}
#mtip .t-det{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line);
  display:flex;flex-direction:column;gap:6px}
#mtip .t-row{display:flex;gap:7px;align-items:flex-start}
#mtip .t-k{flex:none;font-size:10px;font-weight:700;color:var(--pri-ink);background:var(--pri-soft);
  border-radius:5px;padding:2px 6px;margin-top:1px}
#mtip .t-gs{display:flex;flex-wrap:wrap;gap:4px}
#mtip .t-gs i{font-style:normal;background:var(--bg);border:1px solid var(--line);border-radius:5px;
  padding:1.5px 6px;font-size:11px;color:var(--ink);letter-spacing:.02em;line-height:1.5}
#mtip .t-note{margin-top:8px;font-size:10.5px;color:var(--faint);line-height:1.5}

#go{display:block;width:100%;border:0;background:var(--grad);
  color:var(--grad-ink);font-size:16px;font-weight:800;letter-spacing:.02em;
  border-radius:var(--r-md);padding:15px;cursor:pointer;
  box-shadow:0 4px 14px var(--glow);transition:transform .1s,box-shadow .15s,opacity .15s}
#go:hover{box-shadow:0 6px 20px var(--glow)}
#go:active{transform:scale(.985)}

.opts{display:flex;justify-content:center;gap:22px;margin-top:14px;flex-wrap:wrap}
label.tog{display:flex;align-items:center;gap:7px;color:var(--dim);font-size:12.5px;cursor:pointer;
  user-select:none;font-weight:500}
label.tog input[type="checkbox"]{accent-color:var(--pri);width:15px;height:15px;cursor:pointer}
.num-wrap{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:8px;
  background:var(--card);overflow:hidden;height:28px}
.num-wrap button{border:0;background:none;color:var(--dim);font-size:11px;width:28px;height:100%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s}
.num-wrap button:hover{background:var(--pri-soft);color:var(--pri-ink)}
.num-wrap input{width:36px;border:0;text-align:center;font-size:13px;font-weight:700;color:var(--ink);
  outline:none;font-family:inherit;-moz-appearance:textfield;background:transparent}
.num-wrap input::-webkit-outer-spin-button,.num-wrap input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* ===== 결과 ===== */
#stat{margin:26px 4px 12px;font-size:13px;color:var(--dim);display:flex;align-items:center;
  justify-content:space-between;gap:10px;flex-wrap:wrap;min-height:20px}
#stat b{color:var(--pri-ink);font-weight:800}
.legend{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--faint)}
.legend i{width:12px;height:12px;border-radius:4px;background:var(--hit);display:inline-block}

#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(156px,1fr));gap:11px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 13px;
  cursor:pointer;transition:border-color .13s,transform .13s,box-shadow .13s;
  animation:rise .3s cubic-bezier(.2,.7,.3,1) both}
.card:hover{border-color:var(--pri-line);transform:translateY(-2px);box-shadow:var(--shadow)}
.card:active{transform:translateY(0);border-color:var(--pri)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card .top{display:flex;justify-content:space-between;align-items:baseline;gap:6px}
.card .w{font-size:16.5px;font-weight:800;letter-spacing:-.01em}
.card .tag{font-size:9px;white-space:nowrap;border-radius:5px;padding:2px 6px;font-weight:700}
.card .tag.c{background:var(--pri-soft);color:var(--pri-ink)}
.card .tag.r{background:var(--bg);color:var(--faint)}
.card .pr{font-size:11px;color:var(--dim);margin-top:2px;min-height:15px}
.jrow{display:flex;gap:4px;margin-top:9px;justify-content:center}
.jsyl{display:flex;flex-direction:column;gap:2px}
.jsyl span{font-size:10px;line-height:1;color:var(--dim);text-align:center;padding:3.5px 5px;
  border-radius:5px;background:var(--bg);min-width:21px}
.jsyl span.hit{background:var(--hit);color:var(--hit-ink);font-weight:700}
.jsyl span.void{opacity:.3}

#more{display:none;margin:18px auto 0;background:var(--card);border:1px solid var(--line);
  border-radius:999px;color:var(--dim);font-size:13px;font-weight:600;padding:11px 30px;cursor:pointer;
  transition:border-color .15s,color .15s}
#more:hover{border-color:var(--pri);color:var(--pri-ink)}

.empty{color:var(--dim);font-size:13.5px;padding:44px 16px;text-align:center;line-height:2;
  grid-column:1/-1}
.empty .big{font-size:34px;display:block;margin-bottom:8px;filter:grayscale(.2)}

/* ===== 로딩 ===== */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  gap:16px;align-items:center;justify-content:center;font-size:13px;color:var(--dim);z-index:9;
  transition:opacity .3s}
#loading.out{opacity:0;pointer-events:none}
#loading .logo{width:52px;height:52px;border-radius:16px;font-size:22px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
#loading .bar{width:220px;height:6px;border-radius:99px;background:var(--line);overflow:hidden}
#loading .bar i{display:block;height:100%;width:0%;border-radius:99px;
  background:var(--grad);transition:width .15s}
#lpct{font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}

/* ===== 토스트 ===== */
#toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(8px);
  background:var(--ink);color:var(--bg);font-size:13px;font-weight:700;padding:10px 20px;
  border-radius:999px;opacity:0;pointer-events:none;box-shadow:var(--shadow-lg);
  transition:opacity .18s,transform .18s;z-index:10}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{margin-top:56px;text-align:center;font-size:11px;color:var(--faint);line-height:1.9}
footer a{color:var(--dim)}

@media (max-width:560px){
  .wrap{padding:18px 12px 90px}
  .panel{padding:16px}
  .cols{gap:18px}
  .modes button{padding:8px 13px;font-size:12px}
  #grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .brand h1{font-size:17px}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <div class="brand">
    <div class="logo" aria-hidden="true"><svg viewBox="0 0 48 48" width="26" height="26" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round"><circle cx="24" cy="24" r="17"/><line x1="24" y1="9" x2="24" y2="39"/><line x1="11" y1="16.5" x2="37" y2="31.5"/><line x1="11" y1="31.5" x2="37" y2="16.5"/></svg></div>
    <div>
      <h1>라임 검색기</h1>
      <div class="tg">표기가 아닌 <b>소리(발음)</b>로 찾는 한국어 라임</div>
    </div>
  </div>
  <div class="tools">
    <button class="icon-btn" id="theme" title="테마 전환" aria-label="다크/라이트 테마 전환">◐</button>
  </div>
</div>

<div class="panel">
  <div class="cols">
    <div class="col-in">
      <div class="lab"><span>단어 입력 (표기)</span></div>
      <div class="inbox">
        <input id="q" type="search" placeholder="예: 사랑, 불꽃놀이" autocomplete="off"
               autofocus enterkeyhint="search" aria-label="라임을 찾을 단어 입력">
        <button id="clear" aria-label="입력 지우기">✕</button>
      </div>
      <div class="pron">분석한 발음<b id="pron">—</b></div>
    </div>
    <div class="col-ph">
      <div class="lab"><span>검색할 음소 (소리 기준)</span><span class="cnt" id="cnt">0개 선택</span></div>
      <div class="presets" id="presets">
        <button data-p="rhyme" disabled>끝 모음+받침</button>
        <button data-p="last" disabled>끝 음절 전체</button>
        <button data-p="vowel2" disabled>끝 2음절 모음</button>
        <button data-p="none" disabled>모두 해제</button>
      </div>
      <div id="syls"><div class="hint">단어를 입력하면 음절이 나타나요.<br>
        초성·중성·종성을 탭해 검색 조건을 고르고 <span class="kbd">Enter</span>를 눌러 검색하세요.<br>
        음절 글자를 누르면 그 음절 전체가 토글돼요.</div></div>
    </div>
  </div>

  <div class="modes" id="modes" role="tablist" aria-label="일치 모드">
    <button data-m="x" data-d="선택한 음소가 발음까지 정확히 같은 단어만 찾아요">완전 일치</button>
    <button data-m="p" class="on" data-d="ㄱ≈ㅋ, ㅐ≈ㅔ처럼 비슷하게 들리는 음소까지 허용해요">≈ 유사 음소</button>
    <button data-m="f" data-d="울림소리·막힘소리 같은 소리 성질이 같으면 넓게 허용해요">♪ 유사 속성</button>
  </div>
  <div class="mode-desc" id="mode-desc">ㄱ≈ㅋ, ㅐ≈ㅔ처럼 비슷하게 들리는 음소까지 허용해요</div>

  <button id="go">라임 검색</button>

  <div class="opts">
    <label class="tog"><input type="checkbox" id="common" checked>자주 쓰는 말만</label>
    <label class="tog" title="0은 제한 없음">
      글자수
      <span class="num-wrap">
        <button type="button" id="len-dec" aria-label="글자수 줄이기">−</button>
        <input type="number" id="len-limit" value="0" min="0" aria-label="글자수 제한 (0은 제한 없음)">
        <button type="button" id="len-inc" aria-label="글자수 늘리기">＋</button>
      </span>
    </label>
  </div>
</div>

<div id="stat"></div>
<div id="grid"></div>
<button id="more">더 보기</button>

<footer id="foot"></footer>
</div>

<div id="loading">
  <div class="logo"><svg viewBox="0 0 48 48" width="30" height="30" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round"><circle cx="24" cy="24" r="17"/><line x1="24" y1="9" x2="24" y2="39"/><line x1="11" y1="16.5" x2="37" y2="31.5"/><line x1="11" y1="31.5" x2="37" y2="16.5"/></svg></div>
  <div>사전 27만 단어의 발음을 계산하고 있어요…</div>
  <div class="bar"><i id="lbar"></i></div>
  <div id="lpct">0%</div>
</div>
<div id="mtip" role="tooltip" aria-hidden="true"></div>
<div id="toast" role="status" aria-live="polite"></div>

<script src="./단어데이터.js" onerror="window.__DATA_MISSING=1"></script>
<script>
'use strict';
// ===== 테마 =====
(function(){
  const saved=localStorage.getItem('rhyme-theme');
  const dark=saved?saved==='dark':matchMedia('(prefers-color-scheme: dark)').matches;
  if(dark)document.documentElement.dataset.theme='dark';
  document.getElementById('theme').onclick=()=>{
    const d=document.documentElement.dataset.theme==='dark';
    document.documentElement.dataset.theme=d?'':'dark';
    localStorage.setItem('rhyme-theme',d?'light':'dark');
  };
})();

// ===== 한국어 표준발음 근사 엔진 =====
// 음절 = [초성idx, 중성idx, 종성idx(0=없음)]
const CHO = 'ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ';
const JUNG = 'ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ';
const JONG = '␀ㄱㄲㄳㄴㄵㄶㄷㄹㄺㄻㄼㄽㄾㄿㅀㅁㅂㅄㅅㅆㅇㅈㅊㅋㅌㅍㅎ';
const cI = {}, jI = {}, gI = {};
[...CHO].forEach((c, i) => cI[c] = i);
[...JUNG].forEach((c, i) => jI[c] = i);
[...JONG].forEach((c, i) => gI[c] = i);

const SPLIT = {
  'ㄳ': ['ㄱ', 'ㅅ'], 'ㄵ': ['ㄴ', 'ㅈ'], 'ㄶ': ['ㄴ', 'ㅎ'], 'ㄺ': ['ㄹ', 'ㄱ'],
  'ㄻ': ['ㄹ', 'ㅁ'], 'ㄼ': ['ㄹ', 'ㅂ'], 'ㄽ': ['ㄹ', 'ㅅ'], 'ㄾ': ['ㄹ', 'ㅌ'],
  'ㄿ': ['ㄹ', 'ㅍ'], 'ㅀ': ['ㄹ', 'ㅎ'], 'ㅄ': ['ㅂ', 'ㅅ']
};
function splitJong(idx) {
  const ch = JONG[idx];
  if (SPLIT[ch]) return SPLIT[ch];
  return idx ? [ch, null] : [null, null];
}
const REP = { 'ㄲ': 'ㄱ', 'ㅋ': 'ㄱ', 'ㅅ': 'ㄷ', 'ㅆ': 'ㄷ', 'ㅈ': 'ㄷ', 'ㅊ': 'ㄷ', 'ㅌ': 'ㄷ', 'ㅎ': 'ㄷ', 'ㅍ': 'ㅂ' };
const rep = c => REP[c] || c;
const TENSE = { 'ㄱ': 'ㄲ', 'ㄷ': 'ㄸ', 'ㅂ': 'ㅃ', 'ㅅ': 'ㅆ', 'ㅈ': 'ㅉ' };
const ASP = { 'ㄱ': 'ㅋ', 'ㄷ': 'ㅌ', 'ㅈ': 'ㅊ', 'ㅂ': 'ㅍ' };

function decompose(word) {
  const out = [];
  for (const ch of word) {
    const c = ch.charCodeAt(0) - 0xAC00;
    if (c < 0 || c > 11171) return null;
    out.push([(c / 588) | 0, ((c / 28) | 0) % 21, c % 28]);
  }
  return out;
}
function compose(syls) {
  return syls.map(s => String.fromCharCode(0xAC00 + s[0] * 588 + s[1] * 28 + s[2])).join('');
}

// ===== ㄴ첨가 (합성어 경계 — 휴리스틱+예외) =====
const N_SUFFIX = ['잎', '여름', '이불', '이빨'];
const EXC = {
  '담요': '담뇨', '알약': '알략', '물약': '물략', '눈약': '눈냑', '안약': '안냑',
  '색연필': '생년필', '식용유': '시굥뉴', '막일': '망닐', '집안일': '지반닐',
  '콩엿': '콩녇', '눈요기': '눈뇨기', '금융': '금늉', '맨입': '맨닙', '한입': '한닙',
  '늑막염': '능망념', '맹장염': '맹장념', '장염': '장념', '폐렴': '폐렴',
  '맛없다': '마덥따', '맛없어': '마덥써', '멋없다': '머덥따', '멋없어': '머덥써',
  '첫인상': '처딘상', '첫인사': '처딘사', '헛웃음': '허두슴', '몇월': '며둴',
  '눈인사': '눈닌사', '밤이슬': '밤니슬', '한여름': '한녀름'
};
const I_VOWELS = ['ㅣ', 'ㅑ', 'ㅕ', 'ㅛ', 'ㅠ'].map(v => jI[v]);
function nInsert(s, word) {
  for (let i = 0; i + 1 < s.length; i++) {
    if (!s[i][2]) continue;
    const nx = s[i + 1];
    if (nx[0] !== cI['ㅇ']) continue;
    const rest = word.slice(i + 1);
    const [j1] = splitJong(s[i][2]);
    const isSiot = (j1 === 'ㅅ' || j1 === 'ㅆ');
    const isIV = I_VOWELS.includes(nx[1]);
    if (N_SUFFIX.includes(rest) || (isSiot && isIV && word[i + 1] !== '있')) {
      nx[0] = cI['ㄴ'];
    }
  }
}

function pronounce(src) {
  const s = src.map(x => x.slice());
  const n = s.length;
  for (let i = 0; i < n; i++) {
    let [j1, j2] = splitJong(s[i][2]);
    const next = i + 1 < n ? s[i + 1] : null;
    const nc = next ? CHO[next[0]] : null;

    if (!next) {
      let f = j2 ? pickDouble(j1, j2) : j1;
      s[i][2] = f ? gI[rep(f)] : 0;
      break;
    }

    if (nc === 'ㅇ') {
      if (j2) {
        if (j2 === 'ㅎ') { next[0] = cI[j1]; s[i][2] = 0; }
        else {
          s[i][2] = gI[j1];
          next[0] = cI[j2 === 'ㅅ' ? 'ㅆ' : j2];
        }
      } else if (j1 === 'ㅎ') { s[i][2] = 0; }
      else if (j1 && j1 !== 'ㅇ') {
        let lc = j1;
        if (next[1] === jI['ㅣ']) { if (lc === 'ㄷ') lc = 'ㅈ'; else if (lc === 'ㅌ') lc = 'ㅊ'; }
        next[0] = cI[lc];
        s[i][2] = 0;
      }
      continue;
    }

    if ((j1 === 'ㅎ' || j2 === 'ㅎ') && ASP[nc] && nc !== 'ㅂ') {
      next[0] = cI[ASP[nc]];
      const keep = j1 === 'ㅎ' ? null : j1;
      s[i][2] = keep ? gI[keep] : 0;
      continue;
    }
    let f = j2 ? pickDouble(j1, j2) : j1;
    f = f ? rep(f) : null;
    if (nc === 'ㅎ' && f && ASP[f]) {
      next[0] = cI[ASP[f]];
      s[i][2] = 0;
      continue;
    }
    let jong = f;
    let cho = nc;

    if (jong) {
      if (jong === 'ㄴ' && cho === 'ㄹ') jong = 'ㄹ';
      else if (jong === 'ㄹ' && cho === 'ㄴ') cho = 'ㄹ';
      else if ('ㄱㄷㅂ'.includes(jong) && (cho === 'ㄴ' || cho === 'ㅁ')) {
        jong = { 'ㄱ': 'ㅇ', 'ㄷ': 'ㄴ', 'ㅂ': 'ㅁ' }[jong];
      } else if (cho === 'ㄹ' && 'ㅁㅇ'.includes(jong)) { cho = 'ㄴ'; }
      else if (cho === 'ㄹ' && 'ㄱㅂ'.includes(jong)) {
        jong = { 'ㄱ': 'ㅇ', 'ㅂ': 'ㅁ' }[jong]; cho = 'ㄴ';
      }
      else if ('ㄱㄷㅂ'.includes(jong) && TENSE[cho]) { cho = TENSE[cho]; }
      else if (jong === 'ㄹ' && j2 && 'ㄱㅂㅅㅌ'.includes(j2) && TENSE[cho]) { cho = TENSE[cho]; }
    }
    s[i][2] = jong ? gI[jong] : 0;
    next[0] = cI[cho];
  }
  return s;
}
function pickDouble(a, b) {
  const d = a + b;
  if (d === 'ㄹㄱ') return 'ㄱ';
  if (d === 'ㄹㅁ') return 'ㅁ';
  if (d === 'ㄹㅍ') return 'ㅂ';
  if (b === 'ㅎ') return a;
  return a;
}

function g2p(word) {
  if (EXC[word]) return EXC[word];
  const d = decompose(word);
  if (!d) return word;
  nInsert(d, word);
  return compose(pronounce(d));
}

// ===== 앱 =====
if(window.__DATA_MISSING||!window.RHYME_DATA){
  document.getElementById('loading').innerHTML=
    '<div style="max-width:340px;text-align:center;line-height:1.9">'+
    '<div style="font-size:34px;margin-bottom:10px">📂</div>'+
    '<b>단어데이터.js 파일을 찾을 수 없어요.</b><br>'+
    '「단어데이터.js」를 이 HTML 파일과 <u>같은 폴더</u>에 두고 새로고침해 주세요.</div>';
  throw new Error('no data');
}
const RANKED=window.RHYME_DATA.ranked;
const WORDS=window.RHYME_DATA.words.split(' ');
Object.assign(EXC, window.RHYME_DATA.exc||{});
const PRON=new Array(WORDS.length);
let READY=false;

// ----- 유사도 그룹 -----
function groupMap(groups, alphabet){
  const m=new Array(alphabet.length).fill(-1);
  groups.forEach((g,gi)=>{ for(const ch of g) m[alphabet.indexOf(ch)]=gi; });
  let next=groups.length;
  for(let i=0;i<m.length;i++) if(m[i]<0) m[i]=next++;
  return m;
}
const P_CHO=groupMap(['ㄱㄲㅋ','ㄷㄸㅌ','ㅂㅃㅍ','ㅅㅆ','ㅈㅉㅊ','ㄴㅁㄹㅇㅎ'],CHO);
const P_JUNG=groupMap(['ㅏㅑㅘ','ㅐㅔㅒㅖㅙㅞㅚ','ㅓㅕㅝ','ㅗㅛ','ㅜㅠㅡ','ㅣㅢㅟ'],JUNG);
const P_JONG=groupMap(['ㄴㅁㅇㄵㄶㄻ','ㄹㄼㄽㄾㅀ','ㄱㅋㄲㄳㄺ','ㅂㅍㅄㄿ','ㄷㅌㅅㅆㅈㅊㅎ'],JONG);
const F_CHO=groupMap(['ㄱㄲㅋㄷㄸㅌㅂㅃㅍ','ㅅㅆㅈㅉㅊ','ㄴㄹㅁㅇㅎ'],CHO);
const F_JUNG=P_JUNG;
const F_JONG=groupMap(['ㄴㄹㅁㅇㄵㄶㄻㄼㄽㄾㅀ','ㄱㄲㄳㄺㄷㅅㅆㅈㅊㅋㅌㅎㅂㅍㅄㄿ'],JONG);
const GROUPS={p:[P_CHO,P_JUNG,P_JONG],f:[F_CHO,F_JUNG,F_JONG]};
const SLOTNAME=['초성','중성','종성'];
const SLOTCHAR=(s,slot)=> slot===0?CHO[s[0]] : slot===1?JUNG[s[1]] : (s[2]?JONG[s[2]]:'–');

// ----- 상태 -----
let mode='p', commonOnly=true, qSyls=null, sel=new Set(), results=[], shown=0;
const PAGE=60;

// ----- 발음 사전 구축 (청크 처리) -----
(function build(){
  const bar=document.getElementById('lbar'), pct=document.getElementById('lpct');
  let i=0;
  function chunk(){
    const end=Math.min(i+20000,WORDS.length);
    for(;i<end;i++){ PRON[i]=g2p(WORDS[i]); }
    const p=i/WORDS.length*100;
    bar.style.width=p+'%'; pct.textContent=p.toFixed(0)+'%';
    if(i<WORDS.length) setTimeout(chunk,0);
    else{
      READY=true;
      const l=document.getElementById('loading');
      l.classList.add('out'); setTimeout(()=>l.remove(),350);
      document.getElementById('foot').innerHTML=
        '데이터 v'+(window.RHYME_DATA.version||'?')+' · '+WORDS.length.toLocaleString()+'단어<br>'+
        '발음 자료: 국립국어원 <a href="https://opendict.korean.go.kr" target="_blank" rel="noopener">우리말샘</a> (CC BY-SA 2.0 KR)';
    }
  }
  setTimeout(chunk,30);
})();

// ----- 입력 분석 -----
function setPresetsEnabled(on){
  document.querySelectorAll('#presets button').forEach(b=>b.disabled=!on);
}
function analyze(){
  const raw=document.getElementById('q').value.trim();
  const m=raw.split(/\s+/).pop().replace(/[^가-힣]/g,'');
  document.getElementById('clear').style.display=raw?'block':'none';
  const box=document.getElementById('syls'), pr=document.getElementById('pron');
  if(!m){ qSyls=null; sel.clear(); setPresetsEnabled(false);
    box.innerHTML='<div class="hint">단어를 입력하면 음절이 나타나요.<br>'+
      '초성·중성·종성을 탭해 검색 조건을 고르고 <span class="kbd">Enter</span>를 눌러 검색하세요.<br>'+
      '음절 글자를 누르면 그 음절 전체가 토글돼요.</div>';
    pr.textContent='—'; updateCnt(); return; }
  const p=g2p(m);
  qSyls=decompose(p);
  pr.innerHTML='['+esc(p)+']'+(p!==m?'<span class="from">← '+esc(m)+'</span>':'');
  sel.clear();
  const last=qSyls.length-1;
  sel.add(last+':1');
  if(qSyls[last][2]) sel.add(last+':2');
  setPresetsEnabled(true);
  renderSyls(p);
}
function renderSyls(p){
  const box=document.getElementById('syls');
  box.innerHTML='';
  qSyls.forEach((s,i)=>{
    const d=document.createElement('div'); d.className='syl';
    const head=document.createElement('div');
    head.className='head'; head.textContent=p[i]; head.title='음절 전체 선택/해제';
    head.onclick=()=>{
      const keys=[0,1,2].filter(sl=>sl!==2||s[2]).map(sl=>i+':'+sl);
      const allOn=keys.every(k=>sel.has(k));
      keys.forEach(k=>allOn?sel.delete(k):sel.add(k));
      renderSyls(p); autoSearch();
    };
    d.appendChild(head);
    for(let slot=0;slot<3;slot++){
      const b=document.createElement('button');
      b.innerHTML='<span class="g">'+SLOTNAME[slot]+'</span><span class="p">'+SLOTCHAR(s,slot)+'</span>';
      const k=i+':'+slot;
      if(sel.has(k)) b.classList.add('on');
      b.onclick=()=>{ sel.has(k)?sel.delete(k):sel.add(k); b.classList.toggle('on'); updateCnt(); autoSearch(); };
      d.appendChild(b);
    }
    box.appendChild(d);
  });
  updateCnt();
}
function updateCnt(){
  const c=document.getElementById('cnt');
  c.textContent=sel.size+'개 선택';
  c.classList.add('bump'); setTimeout(()=>c.classList.remove('bump'),160);
}

// ----- 프리셋 -----
document.getElementById('presets').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b||!qSyls) return;
  const last=qSyls.length-1;
  sel.clear();
  if(b.dataset.p==='rhyme'){ sel.add(last+':1'); if(qSyls[last][2]) sel.add(last+':2'); }
  else if(b.dataset.p==='last'){ sel.add(last+':0'); sel.add(last+':1'); if(qSyls[last][2]) sel.add(last+':2'); }
  else if(b.dataset.p==='vowel2'){ sel.add(last+':1'); if(last>0) sel.add((last-1)+':1'); }
  // 'none' -> 그대로 빈 선택
  renderSyls(compose(qSyls)); autoSearch();
});

// ----- 유사도 계산 -----
function getSim(qD, tD) {
  let score = 0;
  const minLen = Math.min(qD.length, tD.length);
  for (let i = 1; i <= minLen; i++) {
    const q = qD[qD.length - i], t = tD[tD.length - i];
    if (q[0] === t[0]) score += 1;
    else if (P_CHO[q[0]] === P_CHO[t[0]]) score += 0.5;
    if (q[1] === t[1]) score += 2;
    else if (P_JUNG[q[1]] === P_JUNG[t[1]]) score += 1;
    if (q[2] === t[2]) score += 1;
    else if (P_JONG[q[2]] === P_JONG[t[2]]) score += 0.5;
  }
  score -= Math.abs(qD.length - tD.length) * 0.5;
  return score;
}

// ----- 검색 -----
let autoTimer=null;
function autoSearch(){
  if(!READY||!qSyls) return;
  clearTimeout(autoTimer);
  autoTimer=setTimeout(search,120);
}
function search(){
  const grid=document.getElementById('grid'), stat=document.getElementById('stat');
  grid.innerHTML=''; document.getElementById('more').style.display='none';
  if(!qSyls||!sel.size){
    stat.innerHTML=qSyls?'음소를 하나 이상 선택해 주세요.':'';
    return;
  }
  if(!READY){ stat.innerHTML='아직 발음 사전을 만드는 중이에요. 잠시 후 다시 시도해 주세요.'; return; }

  const qn=qSyls.length;
  const conds=[...sel].map(k=>{
    const [i,slot]=k.split(':').map(Number);
    return [qn-1-i, slot, qSyls[i][slot]];
  });
  const gm=mode==='x'?null:GROUPS[mode];
  const qWord=document.getElementById('q').value.trim().split(/\s+/).pop().replace(/[^가-힣]/g,'');
  const lenLimit=parseInt(document.getElementById('len-limit').value,10)||0;
  const t0=performance.now();
  results=[];
  const N=commonOnly?RANKED:WORDS.length;

  for(let i=0;i<N;i++){
    const w=WORDS[i];
    if(w===qWord) continue;
    if(lenLimit>0 && w.length!==lenLimit) continue;
    const p=PRON[i];
    const pl=p.length;
    let ok=true, exact=0;
    for(const [off,slot,val] of conds){
      const pos=pl-1-off;
      if(pos<0){ ok=false; break; }
      const c=p.charCodeAt(pos)-0xAC00;
      const v= slot===0 ? (c/588)|0 : slot===1 ? ((c/28)|0)%21 : c%28;
      if(v===val){ exact++; continue; }
      if(!gm || gm[slot][v]!==gm[slot][val]){ ok=false; break; }
    }
    if(ok) results.push([exact, i]);
  }

  for (let j = 0; j < results.length; j++) {
    const i = results[j][1];
    const tD = decompose(PRON[i]);
    results[j].push(tD ? getSim(qSyls, tD) : -999);
  }
  results.sort((a,b)=> b[0]-a[0] || b[2]-a[2] || a[1]-b[1]);

  const ms=(performance.now()-t0).toFixed(0);
  shown=0;
  if(!results.length){
    stat.innerHTML='';
    grid.innerHTML='<div class="empty"><span class="big">🔍</span>조건에 맞는 단어가 없어요.<br>'+
      '모드를 「♪ 유사 속성」으로 넓히거나 선택한 음소를 줄여 보세요.</div>';
    return;
  }
  stat.innerHTML='<span><b>'+results.length.toLocaleString()+'개</b> 발견 · '+ms+'ms</span>'+
    '<span class="legend"><i></i>조건에 맞은 소리 · 카드를 누르면 복사돼요</span>';
  render(conds);
}
let lastConds=null;
function render(conds){
  if(conds) lastConds=conds; else conds=lastConds;
  const grid=document.getElementById('grid');
  const end=Math.min(shown+PAGE,results.length);
  const frag=document.createDocumentFragment();
  for(let k=shown;k<end;k++){
    const [ex,i]=results[k], w=WORDS[i], p=PRON[i];
    const card=document.createElement('div'); card.className='card'; card.dataset.w=w;
    card.style.animationDelay=Math.min((k-shown)*12,240)+'ms';
    const hits={};
    for(const [off,slot] of conds){ const pos=p.length-1-off; (hits[pos]=hits[pos]||new Set()).add(slot); }
    let jr='<div class="jrow">';
    for(let x=0;x<p.length;x++){
      const s=decompose(p[x])[0];
      jr+='<div class="jsyl">';
      for(let slot=0;slot<3;slot++){
        const hit=hits[x]&&hits[x].has(slot);
        const ch=SLOTCHAR(s,slot);
        jr+='<span class="'+(hit?'hit':'')+(ch==='–'?' void':'')+'">'+ch+'</span>';
      }
      jr+='</div>';
    }
    jr+='</div>';
    card.innerHTML='<div class="top"><span class="w">'+esc(w)+'</span>'+
      '<span class="tag '+(i<RANKED?'c':'r')+'">'+(i<RANKED?'자주 씀':'드묾')+'</span></div>'+
      '<div class="pr">['+esc(p)+']</div>'+jr;
    frag.appendChild(card);
  }
  grid.appendChild(frag);
  shown=end;
  document.getElementById('more').style.display= shown<results.length?'block':'none';
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')}

// ----- 이벤트 -----
const qEl=document.getElementById('q');
qEl.addEventListener('input',analyze);
qEl.addEventListener('keydown',e=>{

// 상세 그룹은 실제 검색 로직(P_CHO/P_JUNG/P_JONG, F_CHO/F_JUNG/F_JONG)과 동일한 내용
const TIPS={
  x:{
    sum:'선택한 음소가 발음까지 <b>정확히 일치</b>하는 단어만 찾아요.',

const mtip=document.getElementById('mtip');
function tipHTML(t){
  let h='<div class="t-sum">'+t.sum+'</div>';
  if(t.rows){
    h+='<div class="t-det">'+t.rows.map(r=>
      '<div class="t-row"><span class="t-k">'+r[0]+'</span><span class="t-gs">'+
      r[1].map(g=>'<i>'+g+'</i>').join('')+'</span></div>').join('')+'</div>';
  }
  if(t.note) h+='<div class="t-note">'+t.note+'</div>';
  return h;
}
function showTip(b){
  const t=TIPS[b.dataset.m]; if(!t) return;
  mtip.innerHTML=tipHTML(t);
  const r=b.getBoundingClientRect();
  const w=mtip.offsetWidth, h=mtip.offsetHeight;
  let x=r.left+r.width/2-w/2;
  x=Math.max(8,Math.min(x,innerWidth-w-8));
  let y=r.bottom+9;
  if(y+h>innerHeight-8) y=r.top-h-9;
  mtip.style.left=x+'px'; mtip.style.top=y+'px';
  mtip.classList.add('show'); mtip.setAttribute('aria-hidden','false');
}
function hideTip(){ mtip.classList.remove('show'); mtip.setAttribute('aria-hidden','true'); }
const modesEl=document.getElementById('modes');
modesEl.addEventListener('mouseover',e=>{ const b=e.target.closest('button'); if(b) showTip(b); });
modesEl.addEventListener('mouseleave',hideTip);
modesEl.addEventListener('focusin',e=>{ const b=e.target.closest('button'); if(b) showTip(b); });
modesEl.addEventListener('focusout',hideTip);
addEventListener('scroll',hideTip,{passive:true});
document.getElementById('common').addEventListener('change',e=>{commonOnly=e.target.checked; autoSearch();});

const lenInp=document.getElementById('len-limit');
document.getElementById('len-dec').addEventListener('click',()=>{
  const v=parseInt(lenInp.value,10)||0;
  if(v>0){ lenInp.value=v-1; autoSearch(); }
});
document.getElementById('len-inc').addEventListener('click',()=>{
  lenInp.value=(parseInt(lenInp.value,10)||0)+1;
  autoSearch();
});
lenInp.addEventListener('input',()=>{
  if((parseInt(lenInp.value,10)||0)<0) lenInp.value=0;
  autoSearch();
});

// 더 보기 + 무한 스크롤
const moreBtn=document.getElementById('more');
moreBtn.onclick=()=>render();
if('IntersectionObserver' in window){
  new IntersectionObserver(es=>{
    if(es[0].isIntersecting && moreBtn.style.display==='block') render();
  },{rootMargin:'400px'}).observe(moreBtn);
}

// 카드 복사
document.getElementById('grid').addEventListener('click',e=>{
  const c=e.target.closest('.card'); if(!c)return;
  const w=c.dataset.w;
  (navigator.clipboard?navigator.clipboard.writeText(w):Promise.reject()).then(()=>{
    const t=document.getElementById('toast');
    t.textContent='「'+w+'」 복사됨'; t.classList.add('show');
    clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1300);
  }).catch(()=>{});
});
</script>
